<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 90" fill="none">
  <!-- Background white -->
  <rect width="200" height="90" fill="white" rx="6"/>

  <!-- RF Arrow mark (dark red) -->
  <!-- Main horizontal bar of R -->
  <rect x="14" y="22" width="32" height="8" fill="#8B1A1A" rx="1"/>
  <!-- Down stroke of R -->
  <rect x="14" y="22" width="8" height="30" fill="#8B1A1A" rx="1"/>
  <!-- Diagonal leg of R going bottom-right -->
  <polygon points="22,40 46,52 40,52 16,40" fill="#8B1A1A"/>
  <!-- Arrow pointing right (two chevron lines) -->
  <polygon points="50,22 62,36 50,50 56,50 68,36 56,22" fill="#8B1A1A"/>
  <polygon points="60,22 72,36 60,50 66,50 78,36 66,22" fill="#8B1A1A"/>

  <!-- Dash separator -->
  <rect x="82" y="31" width="10" height="8" fill="#1a2e1a" rx="1"/>

  <!-- ON text (dark green / very dark) -->
  <text x="96" y="54" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="34" fill="#1a2e1a" letter-spacing="-1">ON</text>

  <!-- Tagline -->
  <text x="14" y="76" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="#1a2e1a" letter-spacing="2">REAL ESTATE ALWAYS ON</text>
</svg>
